{% extends "layout.html" %}
{% block content %}
<div class="max-w-md w-full bg-slate-900/50 border border-slate-800/80 p-8 rounded-2xl shadow-2xl backdrop-blur-xl mt-4">
    <div class="text-center mb-8">
        <h2 class="text-2xl font-bold tracking-tight text-white">Rencanakan Latihanmu</h2>
        <p class="text-slate-400 text-sm mt-1">Sesuaikan nutrisi latihan dengan cuaca real-time</p>
    </div>
    
    <form action="/" method="POST" class="space-y-5">
        <div>
            <label class="block text-slate-300 text-sm font-medium mb-1.5">Jenis Olahraga</label>
            <select name="sport_type" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-blue-500 transition-colors cursor-pointer">
                <option value="Lari">Lari (Running)</option>
                <option value="Sepeda">Sepeda (Cycling)</option>
            </select>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-slate-300 text-sm font-medium mb-1.5">Durasi (Menit)</label>
                <input type="number" name="duration" min="1" placeholder="90" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-blue-500 transition-colors" required>
            </div>
            <div>
                <label class="block text-slate-300 text-sm font-medium mb-1.5">Berat Badan (Kg)</label>
                <input type="number" name="weight" min="10" placeholder="65" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 focus:outline-none focus:border-blue-500 transition-colors" required>
            </div>
        </div>
        
        <div>
            <label class="block text-slate-300 text-sm font-medium mb-1.5">Lokasi Kota</label>
            <input type="text" name="city" placeholder="Contoh: Jakarta, Tokyo, London" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-blue-500 transition-colors" required>
        </div>
        
        <button type="submit" class="w-full mt-2 bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-blue-500/20 hover:shadow-blue-500/30 transition duration-300 text-center tracking-wide">
            Hitung Strategi Nutrisi
        </button>
    </form>
</div>
{% endblock %}
