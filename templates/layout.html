<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HydroPace — Weather-Adaptive Fueling</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between selection:bg-blue-500 selection:text-white">
    
    <nav class="sticky top-0 z-50 backdrop-blur-md bg-slate-900/70 border-b border-slate-800 p-4 shadow-sm">
        <div class="container mx-auto flex justify-between items-center px-4">
            <div class="font-bold text-xl tracking-tight bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent flex items-center gap-2">
                ⚡ HydroPace
            </div>
            
            <div class="flex items-center gap-2 bg-slate-950 border border-slate-800 px-3 py-1 rounded-full">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-[10px] font-mono tracking-wider text-slate-400 uppercase">System Active — CS50x</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6 flex-grow flex items-center justify-center">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-xl mb-4 text-center max-w-md mx-auto w-full backdrop-blur-sm">
                  ⚠️ {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-slate-900 bg-slate-950 text-slate-600 text-center p-6 text-xs tracking-wider">
        © 2026 Arya Alwani. All Rights Reserved. Built for Harvard CS50x.
    </footer>
</body>
</html>
